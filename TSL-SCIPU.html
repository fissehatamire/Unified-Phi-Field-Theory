<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unified Phi Field Theory – PDF Viewer</title>
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 24px;
            flex: 1;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .subtitle a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .subtitle a:hover {
            text-decoration: underline;
        }
        #pdf-container {
            width: 100%;
            min-height: 600px;
            background: #eef2f7;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        #pdf-canvas {
            width: 100%;
            height: auto;
            display: block;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            color: #475569;
            font-size: 1.1rem;
            gap: 12px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid #dbe0e8;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .controls {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        .controls .nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .controls button {
            background: #f1f4f9;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls button:hover:not(:disabled) {
            background: #dbe0e8;
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .controls .page-info {
            font-size: 0.95rem;
            color: #334155;
            min-width: 80px;
            text-align: center;
        }
        .fallback-link {
            margin-top: 14px;
            font-size: 0.95rem;
            color: #475569;
            text-align: center;
        }
        .fallback-link a {
            color: #2563eb;
            font-weight: 500;
        }
        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
        @media (max-width: 640px) {
            .container { padding: 16px; }
            h1 { font-size: 1.3rem; }
            #pdf-container { min-height: 400px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 Unified Phi Field Theory</h1>
    <div class="subtitle">
        <span>TSL-SCIPU · PDF Preview</span>
        <a href="https://fissehatamire.github.io/Unified-Phi-Field-Theory-IP/TSL-SCIPU.pdf" target="_blank" rel="noopener">
            ⬇ Open original PDF
        </a>
    </div>

    <!-- PDF viewer area -->
    <div id="pdf-container">
        <div id="loading-indicator" class="loading">
            <div class="spinner"></div>
            <span>Loading PDF…</span>
        </div>
        <canvas id="pdf-canvas" style="display: none;"></canvas>
        <div id="error-msg" class="error-msg">
            ⚠️ Could not load the PDF. The server may be unreachable or the file is missing.
            <br />
            Try the <a href="https://fissehatamire.github.io/Unified-Phi-Field-Theory-IP/TSL-SCIPU.pdf" target="_blank">direct link</a> instead.
        </div>
    </div>

    <!-- Navigation controls -->
    <div class="controls" id="controls" style="display: none;">
        <div class="nav">
            <button id="prev-page" disabled>◀ Previous</button>
            <span class="page-info" id="page-info">1 / 1</span>
            <button id="next-page" disabled>Next ▶</button>
        </div>
        <span style="font-size:0.9rem; color:#64748b;">
            PDF.js renderer
        </span>
    </div>

    <div class="fallback-link">
        If the viewer doesn't load, <a href="https://fissehatamire.github.io/Unified-Phi-Field-Theory-IP/TSL-SCIPU.pdf" target="_blank" rel="noopener">click here to open the PDF directly</a> in a new tab.
    </div>
</div>

<script>
    (function() {
        const PDF_URL = 'https://fissehatamire.github.io/Unified-Phi-Field-Theory-IP/TSL-SCIPU.pdf';

        // Set the worker source for PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-indicator');
        const errorEl = document.getElementById('error-msg');
        const controlsEl = document.getElementById('controls');
        const prevBtn = document.getElementById('prev-page');
        const nextBtn = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;

        function renderPage(pageNum) {
            if (!pdfDoc) return;

            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                const container = document.getElementById('pdf-container');
                const containerWidth = container.clientWidth - 32; // padding

                // Scale to fit container width
                const scale = Math.min(1.5, containerWidth / viewport.width);
                const scaledViewport = page.getViewport({ scale });

                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = '100%';
                canvas.style.height = 'auto';

                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };

                page.render(renderContext).promise.then(() => {
                    // Update controls
                    pageInfo.textContent = `${pageNum} / ${totalPages}`;
                    prevBtn.disabled = (pageNum <= 1);
                    nextBtn.disabled = (pageNum >= totalPages);
                }).catch(err => {
                    console.warn('Render error:', err);
                });
            }).catch(err => {
                console.warn('Page fetch error:', err);
                showError();
            });
        }

        function showError() {
            loadingEl.style.display = 'none';
            canvas.style.display = 'none';
            errorEl.style.display = 'block';
            controlsEl.style.display = 'none';
        }

        function loadPDF() {
            loadingEl.style.display = 'flex';
            canvas.style.display = 'none';
            errorEl.style.display = 'none';
            controlsEl.style.display = 'none';

            pdfjsLib.getDocument(PDF_URL).promise
                .then(doc => {
                    pdfDoc = doc;
                    totalPages = doc.numPages;
                    currentPage = 1;

                    loadingEl.style.display = 'none';
                    canvas.style.display = 'block';
                    controlsEl.style.display = 'flex';

                    renderPage(currentPage);
                })
                .catch(err => {
                    console.error('PDF load error:', err);
                    showError();
                });
        }

        // Navigation events
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages) {
                currentPage++;
                renderPage(currentPage);
            }
        });

        // Re-render on window resize (debounced)
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc) renderPage(currentPage);
            }, 300);
        });

        // Start loading
        loadPDF();
    })();
</script>

</body>
</html>
